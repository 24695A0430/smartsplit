{% extends 'base_auth.html' %}

{% block content %}
<p class="text-muted text-center mb-4">Enter your registered email address and we'll send you instructions to reset your password.</p>

<form method="POST">
    {% csrf_token %}
    
    <div class="mb-3">
        <label for="emailInput" class="form-label">Email Address</label>
        <div class="input-group">
            <span class="input-group-text"><i class="fa-solid fa-envelope text-muted"></i></span>
            <input type="email" name="email" id="emailInput" class="form-control" placeholder="E.g. ravi@example.com" required>
        </div>
    </div>

    <button type="submit" class="btn btn-primary w-100 mb-3">Reset Password</button>
    
    <div class="text-center">
        <a href="{% url 'accounts:login' %}" class="text-decoration-none fw-medium"><i class="fa-solid fa-arrow-left me-2"></i>Back to Login</a>
    </div>
</form>
{% endblock %}
